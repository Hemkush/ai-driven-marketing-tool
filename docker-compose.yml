version: "3.9"

services:
  backend:
    build: ./apps/backend
    container_name: ai_marketing_backend
    env_file:
      - ./apps/backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app

  frontend:
    build: ./apps/frontend
    container_name: ai_marketing_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
